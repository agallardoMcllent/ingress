name: Deploy Ingress to AKS

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/ingress/**'
      - '.github/workflows/deploy-ingress.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
  NAMESPACE: apps
  INGRESS_FILE: k8s/ingress/ingress-basic.yaml
  INGRESS_NAME: hello-root-ingress


jobs:
  deploy-ingress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Ensure namespace exists
        run: |
          kubectl get namespace "${NAMESPACE}" || kubectl create namespace "${NAMESPACE}"

      - name: Validate manifest exists
        run: |
          test -f "${INGRESS_FILE}"

      - name: Apply ingress manifest
        run: |
          kubectl apply -f "${INGRESS_FILE}" -n "${NAMESPACE}"

      - name: Verify ingress resource
        run: |
          kubectl get ingress "${INGRESS_NAME}" -n "${NAMESPACE}"

      - name: Describe ingress
        run: |
          kubectl describe ingress "${INGRESS_NAME}" -n "${NAMESPACE}"

      - name: Show all ingress resources
        run: |
          kubectl get ingress -n "${NAMESPACE}" -o wide