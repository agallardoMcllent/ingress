apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-root-ingress
  namespace: apps
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: vsee
                port:
                  number: 80
          - path: /api/suscription
            pathType: Prefix
            backend:
              service:
                name: suscription
                port:
                  number: 80                      